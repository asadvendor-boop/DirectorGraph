server {
    listen 80;
    server_name _;
    client_max_body_size 100m;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Server-level headers apply to every location that declares no add_header of
    # its own (nginx does not merge). The SPA and /media inherit these, including
    # the CSP; /api declares its own set below so the FastAPI docs page keeps its
    # CDN-served Swagger assets.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /api/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 900s;
    }

    location /media/ {
        proxy_pass http://api:8000/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 900s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
